<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Criar Tarefa</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <div class="floating-container">
    <ion-header collapse="condense">
      <ion-toolbar>
        <ion-title size="large">Criar-tarefa</ion-title>
      </ion-toolbar>
    </ion-header>
    <ion-list>
      <ion-item>
        <ion-label position="floating">Título</ion-label>
        <ion-input class="input-titulo" type="text" placeholder="O título é obrigatório" [(ngModel)]="titulo"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="floating">Descrição</ion-label>
        <ion-input type="text" [(ngModel)]="descricao"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="stacked">Data de Vencimento</ion-label>
        <ion-datetime [min]="dataMinima" presentation="date" [(ngModel)]="data">
        </ion-datetime>
      </ion-item>
      <ion-item>
          <ion-label>Término</ion-label>
          <ion-datetime presentation="time" [(ngModel)]="horaTermino">
          </ion-datetime>
        </ion-item>
      <div class="button-container">
        <ion-button class="custom-button mt-3" [disabled]="!titulo.trim()" (click)="criarTarefa()">
          Criar Tarefa
        </ion-button>
      </div>
    </ion-list>
  </div>
</ion-content>

<ion-toast [isOpen]="mostrarToast" message="Tarefa criada com sucesso!" duration="2500" icon="checkmark-circle"
  position="bottom" (didDismiss)="mostrarToast = false">
</ion-toast>
